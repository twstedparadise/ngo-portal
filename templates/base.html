<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Swahilipot Portal{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
      :root {
        --sp-blue:        #38BDF8;
        --sp-blue-mid:    #0EA5E9;
        --sp-blue-dark:   #0369A1;
        --sp-cyan:        #67E8F9;
        --sp-teal:        #2DD4BF;
        --sp-pink:        #F472B6;
        --sp-amber:       #FCD34D;

        --bg-base:        #080E1A;
        --bg-card:        #0D1526;
        --bg-card-2:      #111D33;
        --bg-hover:       #152039;
        --border:         rgba(56, 189, 248, 0.12);
        --border-bright:  rgba(56, 189, 248, 0.35);

        --text-primary:   #E8F4FD;
        --text-secondary: #94B4CC;
        --text-muted:     #4E7A99;

        --success:        #34D399;
        --warning:        #FCD34D;
        --danger:         #F87171;

        --radius-sm:      8px;
        --radius-md:      14px;
        --radius-lg:      20px;

        --glow-blue:      0 0 20px rgba(56, 189, 248, 0.2);
        --glow-strong:    0 0 40px rgba(56, 189, 248, 0.35);
        --shadow-card:    0 4px 24px rgba(0, 0, 0, 0.4), 0 1px 0 rgba(56,189,248,0.08) inset;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg-base);
        color: var(--text-primary);
        min-height: 100vh;
        font-size: 15px;
        line-height: 1.6;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 40% at 10% 0%, rgba(56,189,248,0.08) 0%, transparent 60%),
          radial-gradient(ellipse 50% 30% at 90% 100%, rgba(14,165,233,0.06) 0%, transparent 60%),
          radial-gradient(ellipse 30% 50% at 50% 50%, rgba(45,212,191,0.03) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      .sp-nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(8, 14, 26, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .sp-nav-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }

      .sp-nav-logo {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--sp-blue), var(--sp-teal));
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 14px;
        color: #080E1A;
        box-shadow: var(--glow-blue);
        flex-shrink: 0;
      }

      .sp-nav-name {
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: var(--text-primary);
        letter-spacing: -0.2px;
      }

      .sp-nav-name span { color: var(--sp-blue); }

      .sp-nav-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-sp {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 16px;
        border-radius: var(--radius-sm);
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: all 0.2s ease;
        text-decoration: none;
        white-space: nowrap;
      }

      .btn-sp-ghost {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border);
      }
      .btn-sp-ghost:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
        border-color: var(--border-bright);
      }

      .btn-sp-primary {
        background: linear-gradient(135deg, var(--sp-blue-mid), var(--sp-blue-dark));
        color: #fff;
        box-shadow: 0 2px 12px rgba(14,165,233,0.3);
      }
      .btn-sp-primary:hover {
        box-shadow: 0 4px 20px rgba(14,165,233,0.5);
        transform: translateY(-1px);
      }

      .btn-sp-danger {
        background: linear-gradient(135deg, #EF4444, #B91C1C);
        color: #fff;
        box-shadow: 0 2px 12px rgba(239,68,68,0.25);
      }
      .btn-sp-danger:hover {
        box-shadow: 0 4px 20px rgba(239,68,68,0.4);
        transform: translateY(-1px);
      }

      .btn-sp-success {
        background: linear-gradient(135deg, #10B981, #059669);
        color: #fff;
        box-shadow: 0 2px 12px rgba(16,185,129,0.25);
      }
      .btn-sp-success:hover {
        box-shadow: 0 4px 20px rgba(16,185,129,0.4);
        transform: translateY(-1px);
      }

      .btn-sp-outline {
        background: transparent;
        color: var(--sp-blue);
        border: 1px solid var(--border-bright);
      }
      .btn-sp-outline:hover { background: rgba(56,189,248,0.08); }

      .btn-sp:disabled, .btn-sp[disabled] {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
      }

      .btn-w-full { width: 100%; justify-content: center; }

      .sp-main {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 20px 60px;
      }

      .sp-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow-card);
        transition: border-color 0.2s;
      }
      .sp-card:hover { border-color: var(--border-bright); }

      .sp-card-title {
        font-family: 'Syne', sans-serif;
        font-weight: 600;
        font-size: 13px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 10px;
      }

      .sp-stat {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 20px 22px;
        box-shadow: var(--shadow-card);
        position: relative;
        overflow: hidden;
        transition: all 0.25s ease;
      }
      .sp-stat::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--sp-blue), var(--sp-teal));
        opacity: 0;
        transition: opacity 0.25s;
      }
      .sp-stat:hover { border-color: var(--border-bright); transform: translateY(-2px); box-shadow: var(--glow-blue), var(--shadow-card); }
      .sp-stat:hover::before { opacity: 1; }

      .sp-stat-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.7px;
        margin-bottom: 8px;
      }

      .sp-stat-value {
        font-family: 'Syne', sans-serif;
        font-size: 36px;
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(135deg, var(--sp-blue), var(--sp-cyan));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .sp-stat-icon {
        position: absolute;
        bottom: 14px;
        right: 18px;
        font-size: 28px;
        opacity: 0.12;
      }

      .sp-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .sp-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .sp-grid-7-5 { display: grid; grid-template-columns: 7fr 5fr; gap: 16px; }

      @media (max-width: 768px) {
        .sp-grid-3 { grid-template-columns: 1fr; }
        .sp-grid-2 { grid-template-columns: 1fr; }
        .sp-grid-7-5 { grid-template-columns: 1fr; }
      }

      .sp-page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
      }

      .sp-page-title {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 26px;
        color: var(--text-primary);
        letter-spacing: -0.5px;
      }

      .sp-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 12px;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .sp-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

      .sp-badge-success { background: rgba(52,211,153,0.12); color: var(--success); }
      .sp-badge-warning { background: rgba(252,211,77,0.12); color: var(--warning); }
      .sp-badge-muted   { background: rgba(78,122,153,0.15); color: var(--text-muted); }
      .sp-badge-blue    { background: rgba(56,189,248,0.12); color: var(--sp-blue); }

      .sp-list-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 0;
        border-bottom: 1px solid var(--border);
        gap: 12px;
      }
      .sp-list-item:last-child { border-bottom: none; padding-bottom: 0; }
      .sp-list-item:first-child { padding-top: 0; }

      .sp-list-name { font-weight: 500; color: var(--text-primary); font-size: 14px; }
      .sp-list-sub  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

      .sp-gps-box {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        background: var(--bg-card-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }

      .sp-gps-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--text-muted);
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .sp-gps-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
      .sp-gps-dot.error  { background: var(--danger); }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .sp-gps-text      { font-size: 13px; color: var(--text-secondary); }
      .sp-gps-text.ok   { color: var(--success); }
      .sp-gps-text.err  { color: var(--danger); }

      .sp-alert {
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        font-size: 13px;
        margin-bottom: 16px;
        border-left: 3px solid;
      }
      .sp-alert-success { background: rgba(52,211,153,0.08); border-color: var(--success); color: var(--success); }
      .sp-alert-warning { background: rgba(252,211,77,0.08); border-color: var(--warning); color: var(--warning); }
      .sp-alert-danger  { background: rgba(248,113,113,0.08); border-color: var(--danger);  color: var(--danger); }
      .sp-alert-info    { background: rgba(56,189,248,0.08);  border-color: var(--sp-blue); color: var(--sp-blue); }

      .sp-record {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }
      .sp-record:last-child { border-bottom: none; }
      .sp-record-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--sp-teal); flex-shrink: 0; }
      .sp-record-name { color: var(--text-primary); font-weight: 500; flex: 1; }
      .sp-record-time { color: var(--text-muted); font-size: 12px; }

      .sp-empty {
        text-align: center;
        padding: 28px 16px;
        color: var(--text-muted);
        font-size: 13px;
      }

      .sp-mb { margin-bottom: 16px; }
      .sp-mt { margin-top: 16px; }

      .sp-fade-in { animation: fadeUp 0.45s ease both; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .sp-fade-in:nth-child(2) { animation-delay: 0.07s; }
      .sp-fade-in:nth-child(3) { animation-delay: 0.14s; }
      .sp-fade-in:nth-child(4) { animation-delay: 0.21s; }
    </style>
  </head>
  <body>
    <nav class="sp-nav">
      <a class="sp-nav-brand" href="{% url 'home' %}">
        <div class="sp-nav-logo">S</div>
        <span class="sp-nav-name">Swahilipot <span>Portal</span></span>
      </a>
      <div class="sp-nav-actions">
        {% if user.is_authenticated %}
          <a class="btn-sp btn-sp-ghost" href="{% url 'project_list' %}">Projects</a>
          <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button class="btn-sp btn-sp-ghost" type="submit">Logout</button>
          </form>
        {% else %}
          <a class="btn-sp btn-sp-primary" href="{% url 'login' %}">Login</a>
        {% endif %}
      </div>
    </nav>

    <main class="sp-main">
      {% if messages %}
        {% for message in messages %}
          <div class="sp-alert sp-alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
