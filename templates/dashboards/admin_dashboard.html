{% extends "base.html" %}
{% block title %}Admin Dashboard · NGO Portal{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Admin Dashboard</h1>
    <a class="btn btn-sm btn-outline-secondary" href="/admin/">Admin</a>
  </div>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-muted">Total users</div>
          <div class="fs-3">{{ total_users }}</div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-muted">Active projects</div>
          <div class="fs-3">{{ active_projects }}</div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-muted">Today's attendance</div>
          <div class="fs-3">{{ todays_attendance }}</div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
